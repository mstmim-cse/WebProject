<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Item | UIU Lost & Found</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <i class="fas fa-search-location"></i> UIU L&F
            </a>
            
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <ul class="nav-links" id="navMenu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
                <li><a href="post.html" class="nav-link active">Post Item</a></li>
                <li><a href="profile.html" class="nav-link">Profile</a></li>
            </ul>

            <div class="nav-actions">
                <a href="settings.html" class="btn-icon"><i class="fas fa-cog"></i></a>
                <a href="login.html" class="btn btn-primary">Login</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="section">
        <div class="container" style="max-width: 800px;">
            <div class="card" style="padding: 40px;">
                <h1 style="margin-bottom: 8px;">Report an Item</h1>
                <p style="color: var(--text-secondary); margin-bottom: 32px;">Please provide clear details to help us match the item.</p>

                <form id="postForm">
                    <div class="grid grid-cols-2" style="gap: 20px; margin-bottom: 20px;">
                        <div class="form-group" style="margin-bottom: 0;">
                            <label class="form-label">Report Type</label>
                            <select class="form-control" required>
                                <option value="lost">I lost something</option>
                                <option value="found">I found something</option>
                            </select>
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label class="form-label">Category</label>
                            <select class="form-control" required>
                                <option value="Bag">Bag</option>
                                <option value="Books">Books</option>
                                <option value="Charger">Charger</option>
                                <option value="Earphones">Earphones</option>
                                <option value="ID Card">ID Card</option>
                                <option value="Keys">Keys</option>
                                <option value="Laptop">Laptop</option>
                                <option value="Phone">Phone</option>
                                <option value="Umbrella">Umbrella</option>
                                <option value="Wallet">Wallet</option>
                                <option value="Others">Others</option>                               
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Item Name</label>
                        <input type="text" class="form-control" placeholder="e.g., Black Leather Wallet" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" rows="4" placeholder="Provide details like brand, color, specific marks..." required></textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Location (Lost/Found)</label>
                        <input type="text" class="form-control" placeholder="e.g., Main Library, near cafe" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Date</label>
                        <input type="date" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Upload Image (Optional)</label>
                        <div class="drag-drop-area" id="dropArea">
                            <i class="fas fa-cloud-upload-alt drag-drop-icon"></i>
                            <h4>Drag & Drop your image here</h4>
                            <p style="color: var(--text-secondary); margin-top: 8px;">or click to browse from your device</p>
                            <input type="file" id="fileInput" accept="image/*" style="display: none;">
                        </div>
                    </div>

                    <div style="display: flex; gap: 16px; margin-top: 40px;">
                        <button type="button" class="btn btn-secondary" style="flex: 1;" onclick="window.history.back()">Cancel</button>
                        <button type="submit" class="btn btn-primary" style="flex: 2;">Submit Report</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer style="background-color: var(--surface-color); padding: 40px 0; border-top: 1px solid var(--border-color); text-align: center;">
        <div class="container">
            <p style="color: var(--text-secondary); font-size: 0.875rem;">&copy; 2026 UIU Lost & Found.</p>
        </div>
    </footer>

    <script src="js/components.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
